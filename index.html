<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Cậu...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fce4ec; /* Màu nền hồng nhạt */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%; /* Để hiển thị tốt trên điện thoại */
            position: relative;
            transition: all 0.3s ease;
        }

        h1 {
            color: #e91e63;
            margin-bottom: 20px;
            font-size: 1.8rem; /* Chỉnh lại font cho vừa vặn mobile */
        }

        p.letter {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 30px;
            font-style: italic;
        }

        .btn-group {
            position: relative;
            height: 60px;
            display: flex;
            justify-content: center;
            gap: 15px; /* Giảm khoảng cách chút cho điện thoại nhỏ */
        }

        button {
            padding: 10px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            white-space: nowrap; /* Giữ chữ không bị xuống dòng */
        }

        #yesBtn {
            background-color: #e91e63;
            color: white;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
            z-index: 10; /* Đảm bảo nút Yes luôn nổi lên trên */
        }

        #yesBtn:hover {
            transform: scale(1.05);
            background-color: #d81b60;
        }

        #noBtn {
            background-color: #e0e0e0;
            color: #333;
            position: absolute;
            left: 55%; 
        }

        /* Class mới cho thông báo thành công */
        .success-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease-in;
        }

        .success-message h2 {
            color: #e91e63;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .success-message p {
            font-size: 1.1rem;
            color: #555;
        }
        
        .big-heart {
            font-size: 3rem;
            margin-top: 10px;
            animation: heartbeat 1s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Hiệu ứng tim bay */
        .heart {
            position: absolute;
            color: #e91e63;
            animation: fly 2s ease-out forwards;
            font-size: 20px;
            pointer-events: none; /* Để không che mất nút bấm */
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="questionContent">
            <h1>Gửi Cậu, người tui thương! ❤️</h1>
            
            <p class="letter">
                "Anh đã thích Cô Giáo của anh. Tuấn Hùng làm người yêu tớ nhé?"
            </p>

            <div class="btn-group">
                <button id="yesBtn">Đồng ý</button>
                <button id="noBtn">Không</button>
            </div>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const container = document.getElementById('mainContainer');

        // Logic cho nút "Không"
        // Thêm cả touchstart để hỗ trợ tốt hơn trên điện thoại
        const moveButton = () => {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // Tính toán giới hạn an toàn để nút không chạy ra quá sát mép màn hình
            const safeX = windowWidth - 100; 
            const safeY = windowHeight - 60;

            const randomX = Math.floor(Math.random() * safeX);
            const randomY = Math.floor(Math.random() * safeY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        };

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton); // Hỗ trợ chạm trên mobile

        // Logic cho nút "Đồng ý"
        yesBtn.addEventListener('click', () => {
            // 1. Tạo hiệu ứng tim bay
            createHearts();
            
            // 2. Thay đổi nội dung của container thay vì alert
            container.innerHTML = `
                <div class="success-message">
                    <div class="big-heart">💖</div>
                    <h2>Tớ biết cậu sẽ đồng ý mà!</h2>
                    <p>Yêu cậu nhiều lắm! ❤️</p>
                    <p style="font-size: 0.9rem; margin-top: 10px; color: #888;">(Chụp màn hình lại gửi tớ nha)</p>
                </div>
            `;
        });

        function createHearts() {
            // Tạo tim từ body để nó bay khắp màn hình
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';
                
                // Vị trí ngẫu nhiên trên toàn màn hình
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                
                // Kích thước ngẫu nhiên
                const size = Math.random() * 20 + 10;
                heart.style.fontSize = size + 'px';
                
                document.body.appendChild(heart);
                
                // Xóa tim sau khi bay xong
                setTimeout(() => {
                    heart.remove();
                }, 2000);
            }
        }
    </script>
</body>
</html>
